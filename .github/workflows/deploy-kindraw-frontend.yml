name: Deploy Kindraw Frontend

on:
  push:
    branches:
      - master
    paths:
      - ".env.production"
      - "excalidraw-app/**"
      - "packages/**"
      - "public/**"
      - "package.json"
      - "yarn.lock"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: kindraw-frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn build:app

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy excalidraw-app/build --project-name kindraw-web
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
