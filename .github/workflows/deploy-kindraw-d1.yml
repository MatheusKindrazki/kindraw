name: Deploy Kindraw D1

on:
  push:
    branches:
      - master
    paths:
      - "workers/api/**"
      - "package.json"
      - "yarn.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kindraw-d1-deploy
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply kindraw-db --remote --config workers/api/wrangler.toml
