name = "kindraw-api"
main = "src/index.ts"
compatibility_date = "2025-11-01"

[observability]
enabled = true

[[d1_databases]]
binding = "KINDRAW_DB"
database_name = "kindraw-db"
database_id = "fbaecde8-8e18-4638-ad8f-2ea756225a61"

[[r2_buckets]]
binding = "KINDRAW_BLOBS"
bucket_name = "kindraw-blobs"

[[durable_objects.bindings]]
name = "KINDRAW_COLLAB"
class_name = "KindrawCollaborationRoom"

[vars]
KINDRAW_APP_ORIGIN = "https://kindraw.dev"

[[routes]]
pattern = "api.kindraw.dev"
custom_domain = true

[[migrations]]
tag = "v1"
new_sqlite_classes = ["KindrawCollaborationRoom"]
